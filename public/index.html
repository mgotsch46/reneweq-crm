<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Deal Flow Pro — Wholesale CRM</title>

<!-- PWA: installable app -->
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1c253a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Deal Flow Pro">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">

<!-- Font: Plus Jakarta Sans (Google Fonts) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="mobile.css">
</head>
<body>

<!-- LOGIN / REGISTER -->
<div id="login" class="hidden">
  <div class="card">
    <div class="brand-lockup">
      <img src="/logo-mark.png" alt="Deal Flow Pro" class="brand-logo">
      <h1>Deal Flow <span>Pro</span></h1>
    </div>
    <p class="brand-tag">Wholesale CRM</p>
    <p class="sub" id="authSub">Sign in to your workspace</p>

    <div class="field" id="regNameField" style="display:none">
      <label for="authName">Name</label>
      <input id="authName" type="text" autocomplete="name" placeholder="Your name">
    </div>
    <div class="field">
      <label for="authEmail">Email</label>
      <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="authPassword">Password</label>
      <input id="authPassword" type="password" autocomplete="current-password" placeholder="********">
    </div>

    <button id="authSubmit" class="btn wide">Sign in</button>

    <!-- 2FA code step (shown only when the account has 2FA turned on) -->
    <div id="twofaBox" class="field" style="display:none">
      <label for="twofaCode">Authenticator code</label>
      <input id="twofaCode" type="text" inputmode="numeric" autocomplete="one-time-code"
             maxlength="6" placeholder="6-digit code">
      <button id="twofaSubmit" class="btn wide" style="margin-top:10px">Verify &amp; sign in</button>
      <button type="button" class="linklike" id="twofaCancel" style="margin-top:8px">Back</button>
    </div>

    <div class="err" id="authErr"></div>

    <p style="margin:14px 0 0;font-size:13px;color:var(--muted)" id="authTogglRow">
      <span id="authToggleLabel">Need an account?</span>
      <button type="button" class="linklike" id="authToggle">Create account</button>
    </p>
  </div>
</div>

<!-- APP SHELL -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="logo"><img src="/logo-mark.png" alt="" class="logo-mark">Deal Flow <span>Pro</span></div>
    <nav class="tabs" id="navTabs">
      <button data-tab="dashboard">Dashboard</button>
      <button data-tab="pipeline">Pipeline</button>
      <button data-tab="contacts">Contacts</button>
      <button data-tab="conversations">Conversations<span class="navbadge hidden" id="convNavBadge"></span></button>
      <button data-tab="tasks">Tasks</button>
      <button data-tab="leadengine">Lead Engine</button>
      <button data-tab="team" id="teamTabBtn" class="hidden">Team</button>
      <button data-tab="settings">Settings</button>
    </nav>
    <div class="spacer"></div>
    <span class="mode-badge" id="modeBadge">...</span>
    <div class="who" id="whoBox"></div>
    <button class="btn ghost small" id="logoutBtn">Log out</button>
  </header>

  <main>
    <section id="view-dashboard" class="view hidden"></section>
    <section id="view-conversations" class="view hidden"></section>
    <section id="view-pipeline" class="view hidden"></section>
    <section id="view-contacts" class="view hidden"></section>
    <section id="view-leadengine" class="view hidden"></section>
    <section id="view-tasks" class="view hidden"></section>
    <section id="view-team" class="view hidden"></section>
    <section id="view-settings" class="view hidden"></section>
  </main>
</div>

<!-- MODAL MOUNT -->
<div id="modalMount"></div>

<!-- SOFTPHONE CALL WIDGET (shown during active/incoming Twilio calls) -->
<div id="callWidget" class="call-widget hidden"></div>

<!-- Twilio Voice SDK (in-browser softphone) — served via jsDelivr npm mirror
     (Twilio no longer hosts the v2 SDK on their own CDN). -->
<script src="https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2.11.1/dist/twilio.min.js"></script>
<script src="app.js"></script>
<script src="mobile.js"></script>
</body>
</html>
